name: Keep Streamlit Awake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          STATUS=$(curl -I -s -o /dev/null -w "%{http_code}" "https://budgetapp-guiltfree.streamlit.app/" || true)
          echo "Observed status: $STATUS"
