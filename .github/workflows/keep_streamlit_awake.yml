name: Keep Streamlit Awake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          STATUS=$(curl -L -o /dev/null -s -w "%{http_code}" "https://budgetapp-guiltfree.streamlit.app/")
          echo "HTTP status: $STATUS"
          test "$STATUS" -ge 200
          test "$STATUS" -lt 400
